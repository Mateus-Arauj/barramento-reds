## Nginx site configuration for mdb-health
# Replace the placeholders below (e.g., YOUR_API_DOMAIN, YOUR_SUPERSET_DOMAIN,
# and the port numbers) with the actual values used on your server.

# Upstreams — point to services as exposed on the host by docker-compose
upstream fastapi_up {
    # Ex: 127.0.0.1:8000 or 127.0.0.1: ${FASTAPI_PORT}
    server 127.0.0.1:8000;  # <- replace 8000 by your FASTAPI_PORT
}

upstream superset_up {
    # Ex: 127.0.0.1:8088 or replace below by your SUPERSET_PORT
    server 127.0.0.1:8088;  # <- replace 8088 by your SUPERSET_PORT
}

### API (FastAPI) server block
server {
    listen 80;
    server_name api.example.com;  # <- replace with your API domain (ex: api.mydomain.com)

    # Allow certbot to validate
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://fastapi_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websockets / long polling
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;

        proxy_buffering off;
    }
}

### Superset server block
server {
    listen 80;
    server_name superset.example.com;  

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://superset_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;

        proxy_buffering off;
    }
}

# Notes:
# - Do NOT expose Postgres through nginx. Keep it on the internal Docker network.
# - If you prefer path-based routing (example.com/api and example.com/superset),
#   we can provide that variant instead.
