apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: mdb-health
  labels:
    app: fastapi
    version: v1
spec:
  # HPA gerenciará replicas automaticamente
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Anti-affinity para não colocar pods no mesmo node
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - fastapi
                topologyKey: kubernetes.io/hostname

      containers:
        - name: fastapi
          image: mdb-health-fastapi:latest # Substituir pelo seu registry
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          # Variáveis de ambiente do ConfigMap
          envFrom:
            - configMapRef:
                name: mdb-health-config

          # Variáveis de ambiente do Secret
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mdb-health-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mdb-health-secret
                  key: POSTGRES_PASSWORD
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mdb-health-secret
                  key: API_TOKEN

          # Recursos
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup probe para aplicações que demoram a iniciar
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          # Lifecycle hooks
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      # Grace period para shutdown gracioso
      terminationGracePeriodSeconds: 30
