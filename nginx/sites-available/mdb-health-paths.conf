## Nginx path-based routing for mdb-health (damatlas.cloud)
# Use this if you prefer `damatlas.cloud/api` and `damatlas.cloud/superset` instead of subdomains.
# This assumes nginx runs on the host and can resolve Docker container names (or you proxy to host ports).

server {
    listen 80;
    server_name damatlas.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # FastAPI under /api/
    location /api/ {
        proxy_pass http://fastapi:8000/;  # replace 8000 by your FASTAPI_PORT if different
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # Superset under /superset/
    location /superset/ {
        proxy_pass http://superset:8088/;  # Superset listens on 8088 inside the container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # Optional: redirect root to a landing page or to /superset/
    location = / {
        return 302 /superset/;
    }
}

# Notes:
# - Applications may assume they are served from root ("/") and might need configuration
#   to work under a subpath (Superset may need additional config). Test each app.
# - If you're running the nginx-proxy inside Docker, path-based routing is more complex
#   (jwilder/nginx-proxy is host-based). Consider running a custom nginx container or
#   using a separate nginx instance on the host for path-based routing.
