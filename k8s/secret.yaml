# IMPORTANTE: Este arquivo contém valores de exemplo
# Em produção, use kubectl create secret ou ferramentas como Sealed Secrets, External Secrets, etc.
#
# Para criar o secret:
# kubectl create secret generic mdb-health-secret \
#   --from-literal=POSTGRES_USER=fhir_admin \
#   --from-literal=POSTGRES_PASSWORD=your-secure-password \
#   --from-literal=API_TOKEN=your-api-token \
#   --from-literal=SUPERSET_SECRET_KEY=your-superset-key \
#   --from-literal=SUPERSET_ADMIN_PASSWORD=admin-password \
#   -n mdb-health

apiVersion: v1
kind: Secret
metadata:
  name: mdb-health-secret
  namespace: mdb-health
  labels:
    app: mdb-health
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "fhir_admin"
  POSTGRES_PASSWORD: "CHANGE-THIS-PASSWORD"
  SUPERSET_DB_USER: "superset_admin"
  SUPERSET_DB_PASS: "CHANGE-THIS-PASSWORD"

  # API Token
  API_TOKEN: "troque-essa-chave"

  # Superset
  SUPERSET_SECRET_KEY: "CHANGE-THIS-SECRET-KEY"
  SUPERSET_ADMIN_USERNAME: "admin"
  SUPERSET_ADMIN_PASSWORD: "CHANGE-THIS-PASSWORD"
  SUPERSET_ADMIN_EMAIL: "admin@example.com"
