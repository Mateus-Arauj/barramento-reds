version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "effective_cache_size=1GB"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks: [core]

  # hapi:
  #   image: hapiproject/hapi:v6.10.0
  #   environment:
  #     - "spring.profiles.active=postgres"
  #     - "spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${HAPI_DB}"
  #     - "spring.datasource.username=${HAPI_DB_USER}"
  #     - "spring.datasource.password=${HAPI_DB_PASS}"
  #     - "spring.datasource.driverClassName=org.postgresql.Driver"
  #     - "spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect"
  #     - spring.jpa.hibernate.ddl-auto=update
  #     - spring.flyway.enabled=true
  #     - "JAVA_OPTS=${HAPI_JAVA_OPTS}"
  #     - "hapi.fhir.server_address=http://localhost:${HAPI_HTTP_PORT}/fhir"
  #     - "hapi.fhir.fhir_version=R4"
  #   depends_on: [postgres]
  #   ports:
  #     - "${HAPI_HTTP_PORT}:8080"
  #   networks: [core]

  fastapi:
    build:
      context: ./fastapi
    container_name: fastapi
    restart: unless-stopped
    environment:
      API_TOKEN: ${API_TOKEN}
      # Configurações do banco de dados FHIR
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      FHIR_DB: ${FHIR_DB}
      # nginx-proxy / acme labels
      VIRTUAL_HOST: "api.damatlas.cloud"
      LETSENCRYPT_HOST: "api.damatlas.cloud"
      LETSENCRYPT_EMAIL: "${LETSENCRYPT_EMAIL}"
      VIRTUAL_PORT: "${FASTAPI_PORT}"
    command: >
      sh -c "uvicorn app:app --host 0.0.0.0 --port ${FASTAPI_PORT} --workers 1"
    # Note: remove published ports to expose only via proxy (nginx-proxy)
    depends_on: [postgres]
    networks: [core]

  superset:
    image: apache/superset:4.0.2
    container_name: superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      SUPERSET_DATABASE_URI: >
        postgresql+psycopg2://${SUPERSET_DB_USER}:${SUPERSET_DB_PASS}@${POSTGRES_HOST}:${POSTGRES_PORT}/${SUPERSET_DB}
      # Docker labels / env used by the nginx-proxy + acme companion to auto-configure
      VIRTUAL_HOST: "superset.damatlas.cloud"
      LETSENCRYPT_HOST: "superset.damatlas.cloud"
      LETSENCRYPT_EMAIL: "${LETSENCRYPT_EMAIL}"
      VIRTUAL_PORT: "8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - superset_home:/app/superset_home
    depends_on: [postgres]
    # Don't publish the Superset port to host; proxy will route to container
    networks: [core]
  nginx-proxy:
    image: jwilder/nginx-proxy:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx_certs:/etc/nginx/certs:rw
      - nginx_vhost:/etc/nginx/vhost.d:rw
      - nginx_html:/usr/share/nginx/html:rw
    networks: [core]

  letsencrypt:
    image: nginxproxy/acme-companion:2.8.0
    container_name: nginx-letsencrypt
    restart: unless-stopped
    depends_on: [nginx-proxy]
    environment:
      DEFAULT_EMAIL: "${LETSENCRYPT_EMAIL}" # <- set via env or .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx_certs:/etc/nginx/certs:rw
      - nginx_vhost:/etc/nginx/vhost.d:rw
      - nginx_html:/usr/share/nginx/html:rw
    networks: [core]

networks:
  core: {}

volumes:
  pgdata: {}
  superset_home: {}

  # Volumes used by nginx-proxy (optional local copies)
  nginx_certs: {}
  nginx_vhost: {}
  nginx_html: {}
